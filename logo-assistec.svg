<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&amp;display=swap');
    </style>
  </defs>

  <!-- Globe with arrows -->
  <g transform="translate(8, 6)">
    <!-- Globe body -->
    <circle cx="34" cy="34" r="30" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Vertical meridian -->
    <ellipse cx="34" cy="34" rx="13" ry="30" stroke="white" stroke-width="1.8" fill="none"/>
    <!-- Equator -->
    <line x1="4" y1="34" x2="64" y2="34" stroke="white" stroke-width="1.8"/>
    <!-- Upper latitude -->
    <ellipse cx="34" cy="21" rx="24" ry="3.5" stroke="white" stroke-width="1.2" fill="none" opacity="0.45"/>
    <!-- Lower latitude -->
    <ellipse cx="34" cy="47" rx="24" ry="3.5" stroke="white" stroke-width="1.2" fill="none" opacity="0.45"/>

    <!-- Arrow top-right (pointing right) -->
    <path d="M52,8 L52,4 L66,13 L52,22 L52,18 L42,18 L42,14 L44,12 L52,12 Z" fill="white" opacity="0.95"/>

    <!-- Arrow bottom-left (pointing left) -->
    <path d="M16,48 L16,44 L26,44 L26,46 L24,48 L16,48 Z M16,52 L16,56 L2,47 L16,38 L16,42 L26,42 L26,38 L24,40 Z" fill="white" opacity="0.00"/>
    <path d="M16,60 L16,56 L2,47 L16,38 L16,42 L28,42 L28,46 L26,48 L16,48 Z" fill="white" opacity="0.7"/>

    <!-- Center dot -->
    <circle cx="34" cy="34" r="3" fill="white"/>
  </g>

  <!-- ASSISTEC text - small caps style (first letter taller) -->
  <text x="82" y="42" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" fill="white" letter-spacing="1">
    <tspan font-size="40">A</tspan><tspan font-size="30" dy="0">SSISTEC</tspan>
  </text>

  <!-- INFORMÁTICA text -->
  <text x="84" y="64" font-family="'Montserrat', 'Arial Black', sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="1.5">I<tspan font-size="17">NFORMÁTICA</tspan></text>
</svg>
