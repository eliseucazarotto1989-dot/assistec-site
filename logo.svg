<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Icon: Globe with tech circuit/arrows -->
  <g transform="translate(8, 8)">
    <!-- Outer circle -->
    <circle cx="32" cy="32" r="30" stroke="#1a56db" stroke-width="2.5" fill="none"/>
    <!-- Globe lines -->
    <ellipse cx="32" cy="32" rx="16" ry="30" stroke="#1a56db" stroke-width="1.5" fill="none"/>
    <line x1="2" y1="32" x2="62" y2="32" stroke="#1a56db" stroke-width="1.5"/>
    <ellipse cx="32" cy="20" rx="24" ry="4" stroke="#1a56db" stroke-width="1" fill="none" opacity="0.5"/>
    <ellipse cx="32" cy="44" rx="24" ry="4" stroke="#1a56db" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Arrow 1 (right) -->
    <g transform="translate(48, 18)">
      <path d="M0 8 L12 0 L12 5 L20 5 L20 11 L12 11 L12 16 Z" fill="#f59e0b"/>
    </g>
    <!-- Arrow 2 (left bottom) -->
    <g transform="translate(-4, 38)">
      <path d="M20 8 L8 0 L8 5 L0 5 L0 11 L8 11 L8 16 Z" fill="#1a56db" opacity="0.6"/>
    </g>
    <!-- Center dot -->
    <circle cx="32" cy="32" r="4" fill="#1a56db"/>
    <circle cx="32" cy="32" r="2" fill="white"/>
  </g>
  <!-- Text: ASSISTEC -->
  <text x="82" y="42" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="900" letter-spacing="2" fill="#111827">ASSISTEC</text>
  <!-- Text: INFORMATICA -->
  <text x="83" y="62" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="4" fill="#6b7280">INFORM&#xC1;TICA</text>
  <!-- Accent line -->
  <rect x="82" y="46" width="50" height="2.5" rx="1.25" fill="#1a56db"/>
</svg>
