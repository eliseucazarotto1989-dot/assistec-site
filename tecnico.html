    // ===== CATEGORIAS =====
    const CATEGORIES = [...new Set(PROCEDURES.map(p => p.category))];
    let selectedCategory = 'todos';
    let searchQuery = '';

    // ===== INICIALIZAR =====
    function initTechPanel() {
        // Render category chips
        const chipsContainer = document.getElementById('catChips');
        CATEGORIES.forEach(cat => {
            const count = PROCEDURES.filter(p => p.category === cat).length;
            const btn = document.createElement('button');
            btn.className = 'tech-chip';
            btn.textContent = cat + ' (' + count + ')';
            btn.onclick = function() { selectCategory(cat, this); };
            chipsContainer.appendChild(btn);
        });

        renderArticles(PROCEDURES);
    }

    function selectCategory(cat, btn) {
        selectedCategory = cat;
        document.querySelectorAll('.tech-chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        filterArticles();
    }

    function filterArticles() {
        searchQuery = document.getElementById('techSearch').value.toLowerCase().trim();
        let filtered = PROCEDURES;

        if (selectedCategory !== 'todos') {
            filtered = filtered.filter(p => p.category === selectedCategory);
        }

        if (searchQuery) {
            filtered = filtered.filter(p => {
                const haystack = [
                    p.title, p.description, p.category,
                    p.notes || '',
                    ...p.tags,
                    ...p.steps.map(s => s.text + ' ' + (s.cmd || '') + ' ' + (s.text2 || ''))
                ].join(' ').toLowerCase();
                return searchQuery.split(' ').every(word => haystack.includes(word));
            });
        }

        document.getElementById('searchCount').textContent = filtered.length + ' resultado' + (filtered.length !== 1 ? 's' : '');
        renderArticles(filtered);
    }

    function renderArticles(articles) {
        const container = document.getElementById('articlesList');
        const noResults = document.getElementById('noResults');

        if (articles.length === 0) {
            container.innerHTML = '';
            noResults.style.display = 'block';
            return;
        }

        noResults.style.display = 'none';

        container.innerHTML = articles.map(p => {
            const diffLabel = { basico: 'Básico', intermediario: 'Intermediário', avancado: 'Avançado' };
            const diffClass = { basico: 'easy', intermediario: 'medium', avancado: 'hard' };

            return `
            <div class="tech-article" id="article-${p.id}">
                <div class="tech-article-header" onclick="toggleArticle(${p.id})">
                    <div class="tech-article-info">
                        <span class="tech-article-cat">${esc(p.category)}</span>
                        <span class="tech-diff tech-diff-${diffClass[p.difficulty]}">${diffLabel[p.difficulty]}</span>
                    </div>
                    <h3 class="tech-article-title">${highlightSearch(esc(p.title))}</h3>
                    <p class="tech-article-desc">${highlightSearch(esc(p.description))}</p>
                    <div class="tech-article-tags">
                        ${p.tags.slice(0, 5).map(t => '<span class="tech-tag">' + esc(t) + '</span>').join('')}
                    </div>
                    <svg class="tech-article-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="tech-article-body" id="body-${p.id}">
                    <ol class="tech-steps">
                        ${p.steps.map((s, i) => `
                            <li class="tech-step">
                                <div class="tech-step-text">${highlightSearch(esc(s.text))}</div>
                                ${s.cmd ? `
                                <div class="tech-cmd">
                                    <code>${esc(s.cmd)}</code>
                                    <button class="tech-cmd-copy" onclick="copyCmd(this, '${esc(s.cmd).replace(/'/g, "\\'")}')">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                        Copiar
                                    </button>
                                </div>` : ''}
                                ${s.text2 ? `<div class="tech-step-detail">${highlightSearch(esc(s.text2))}</div>` : ''}
                            </li>
                        `).join('')}
                    </ol>
                    ${p.notes ? `
                    <div class="tech-notes">
                        <strong>Observações:</strong>
                        <pre>${highlightSearch(esc(p.notes))}</pre>
                    </div>` : ''}
                </div>
            </div>`;
        }).join('');
    }

    function toggleArticle(id) {
        const article = document.getElementById('article-' + id);
        article.classList.toggle('open');
    }

    function copyCmd(btn, cmd) {
        navigator.clipboard.writeText(cmd).then(() => {
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copiado!';
            btn.classList.add('copied');
            setTimeout(() => { btn.innerHTML = originalHTML; btn.classList.remove('copied'); }, 2000);
        });
    }

    function highlightSearch(text) {
        if (!searchQuery) return text;
        const words = searchQuery.split(' ').filter(w => w.length > 1);
        let result = text;
        words.forEach(word => {
            const regex = new RegExp('(' + word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            result = result.replace(regex, '<mark>$1</mark>');
        });
        return result;
    }

    function esc(text) {
        const div = document.createElement('div');
        div.textContent = text || '';
        return div.innerHTML;
    }
    </script>
